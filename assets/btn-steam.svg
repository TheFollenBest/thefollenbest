<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="210" height="46" viewBox="0 0 210 46" role="img" aria-label="STEAM — connect">
<title>STEAM — connect</title><style>
text{font-family:'Cascadia Code','JetBrains Mono','Fira Code',ui-monospace,'SF Mono',Menlo,Consolas,monospace}
@keyframes b4fadeIn{to{opacity:1}}
.b4fi{opacity:0;animation:b4fadeIn .06s linear both}
@keyframes b4blink{0%,55%{opacity:1}56%,100%{opacity:0}}
